version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-accelerate-api
    ports:
      - "3001:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '20'
          memory: 32G
        reservations:
          cpus: '1'
          memory: 2G

